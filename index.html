<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUROSUMMER 🏵️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Pacifico&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
color:white;
text-align:center;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* MAPA EUROPA */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("https://upload.wikimedia.org/wikipedia/commons/6/6f/Europe_satellite_globe.jpg");
background-size:cover;
background-position:center;
filter:brightness(0.35);
z-index:-2;
}

/* GRADIENTE */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#ff7e5f,#feb47b,#ffd166,#06d6a0,#118ab2);
opacity:.35;
z-index:-1;
}

/* CARD */

.container{
background:rgba(0,0,0,.45);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
max-width:90%;
}

h1{
font-family:'Pacifico';
font-size:clamp(40px,7vw,75px);
margin:0;
}

.subtitle{
opacity:.9;
margin-top:10px;
}

#contador{
font-size:clamp(28px,5vw,50px);
margin-top:25px;
font-weight:600;
}

/* PINS */

.pin{
position:absolute;
font-size:32px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

.lisboa{top:45%;left:44%}
.madrid{top:42%;left:48%}
.barcelona{top:41%;left:53%}

/* AVIÃO */

.plane{
position:absolute;
font-size:60px;
top:75%;
left:-10%;
animation:fly 18s linear infinite;
}

@keyframes fly{
0%{left:-10%;top:75%}
40%{top:55%}
70%{top:40%}
100%{left:75%;top:35%}
}

/* CRUZEIRO */

.ship{
position:absolute;
font-size:65px;
bottom:18%;
left:58%;
animation:shipMove 6s ease-in-out infinite alternate;
}

@keyframes shipMove{
from{transform:translateX(-15px)}
to{transform:translateX(25px)}
}

/* ICONES DE VIAGEM */

.icon{
position:absolute;
font-size:35px;
opacity:0.9;
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

.praia{top:18%;right:12%}
.cerveja{bottom:20%;left:12%}
.mala{top:25%;left:15%}
.camera{bottom:30%;right:10%}
.cidade{top:70%;right:35%}
.sol{top:8%;right:30%}

/* MOBILE */

@media(max-width:600px){

.pin{font-size:24px}

.plane{font-size:45px}

.ship{font-size:50px}

.icon{font-size:26px}

}

</style>
</head>

<body>

<div class="plane">✈️</div>
<div class="ship">🛳️</div>

<div class="pin lisboa">📍</div>
<div class="pin madrid">📍</div>
<div class="pin barcelona">📍</div>

<div class="icon praia">🏖️</div>
<div class="icon cerveja">🍻</div>
<div class="icon mala">🧳</div>
<div class="icon camera">📸</div>
<div class="icon cidade">🏙️</div>
<div class="icon sol">☀️</div>

<div class="container">

<h1>EUROSUMMER 🏵️</h1>

<p class="subtitle">Contagem regressiva para a viagem dos amigos</p>

<div id="contador"></div>

<p>Lisboa • Madrid • Barcelona • Mediterrâneo</p>

</div>

<script>

const dataViagem = new Date("2026-08-18T00:00:00");

function atualizar(){

const agora = new Date();
const diff = dataViagem - agora;

if(diff<=0){
document.getElementById("contador").innerHTML="A VIAGEM COMEÇOU ✈️";
return;
}

const d=Math.floor(diff/(1000*60*60*24));
const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m=Math.floor((diff%(1000*60*60))/(1000*60));
const s=Math.floor((diff%(1000*60))/1000);

document.getElementById("contador").innerHTML=
d+"d "+h+"h "+m+"m "+s+"s";

}

setInterval(atualizar,1000);

</script>

</body>
</html>
