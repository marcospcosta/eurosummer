<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EUROSUMMER 🏵️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Lobster&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
color:white;
text-align:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* FUNDO VERÃO */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
background-size:cover;
background-position:center;
z-index:-2;
}

/* GRADIENTE LEVE */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
45deg,
rgba(255,180,120,0.25),
rgba(255,220,120,0.25),
rgba(120,200,255,0.25)
);
z-index:-1;
}

/* CARD */

.container{
background:rgba(0,0,0,0.45);
padding:45px;
border-radius:20px;
backdrop-filter:blur(10px);
width:90%;
max-width:520px;
}

/* TITULO */

h1{
font-family:'Lobster',cursive;
font-size:clamp(48px,5vw,72px);
margin:0;
}

/* SUBTITULO */

.subtitle{
margin-top:12px;
font-size:18px;
opacity:.9;
}

/* CONTADOR */

#contador{
font-size:clamp(30px,4vw,46px);
margin-top:25px;
font-weight:600;
}

/* AVIÃO */

.plane{
position:absolute;
font-size:60px;
bottom:18%;
left:-80px;
animation:fly 18s linear infinite;
}

@keyframes fly{
0%{left:-80px}
100%{left:110%}
}

/* CRUZEIRO */

.ship{
position:absolute;
font-size:70px;
bottom:8%;
right:15%;
animation:ship 6s ease-in-out infinite alternate;
}

@keyframes ship{
from{transform:translateX(-20px)}
to{transform:translateX(20px)}
}

/* ICONES */

.icon{
position:absolute;
font-size:34px;
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}

.sun{top:5%;right:8%}
.beach{top:25%;right:5%}
.camera{bottom:25%;right:5%}
.beer{bottom:15%;left:5%}
.bag{top:20%;left:5%}

/* MOBILE */

@media(max-width:600px){

.container{
padding:30px;
}

.plane{
font-size:40px;
bottom:22%;
}

.ship{
font-size:50px;
bottom:10%;
}

.icon{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="plane">✈️</div>
<div class="ship">🛳️</div>

<div class="icon sun">☀️</div>
<div class="icon beach">🏖️</div>
<div class="icon camera">📸</div>
<div class="icon beer">🍻</div>
<div class="icon bag">🧳</div>

<div class="container">

<h1>EUROSUMMER 🏵️</h1>

<p class="subtitle">
Contagem regressiva para a viagem
</p>

<div id="contador"></div>

<p>Lisboa • Madrid • Barcelona • Mediterrâneo</p>

</div>

<script>

const dataViagem = new Date("2026-08-18T00:00:00");

function atualizar(){

const agora = new Date();
const diff = dataViagem - agora;

if(diff<=0){
document.getElementById("contador").innerHTML="A VIAGEM COMEÇOU ✈️";
return;
}

const d=Math.floor(diff/(1000*60*60*24));
const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m=Math.floor((diff%(1000*60*60))/(1000*60));
const s=Math.floor((diff%(1000*60))/1000);

document.getElementById("contador").innerHTML=
d+"d "+h+"h "+m+"m "+s+"s";

}

setInterval(atualizar,1000);

</script>

</body>
</html>
