<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EUROSUMMER 🏵️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Lobster&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
color:white;
text-align:center;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* MAPA REAL DA EUROPA */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("https://upload.wikimedia.org/wikipedia/commons/9/97/Mediterranean_Basin_and_Near_East_satellite_image.jpg");
background-size:cover;
background-position:center;
filter:brightness(0.55);
z-index:-2;
}

/* GRADIENTE SUAVE */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.35));
z-index:-1;
}

/* CARD CENTRAL */

.container{
background:rgba(0,0,0,0.45);
padding:35px;
border-radius:20px;
backdrop-filter:blur(8px);
max-width:420px;
width:90%;
}

/* TITULO */

h1{
font-family:'Lobster',cursive;
font-size:clamp(42px,7vw,70px);
margin:0;
letter-spacing:1px;
}

/* SUBTITULO */

.subtitle{
margin-top:10px;
font-size:18px;
opacity:.9;
}

/* CONTADOR */

#contador{
font-size:clamp(26px,5vw,42px);
margin-top:25px;
font-weight:600;
}

/* AVIÃO */

.plane{
position:absolute;
font-size:55px;
top:75%;
left:-10%;
animation:fly 20s linear infinite;
}

@keyframes fly{
0%{left:-10%;top:75%}
50%{top:55%}
100%{left:75%;top:40%}
}

/* CRUZEIRO */

.ship{
position:absolute;
font-size:65px;
bottom:18%;
left:60%;
animation:ship 6s ease-in-out infinite alternate;
}

@keyframes ship{
from{transform:translateX(-15px)}
to{transform:translateX(20px)}
}

/* ICONES */

.icon{
position:absolute;
font-size:34px;
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}

.sun{top:8%;right:20%}
.beach{top:22%;right:10%}
.camera{bottom:30%;right:10%}
.beer{bottom:22%;left:10%}
.bag{top:28%;left:12%}

/* MOBILE */

@media(max-width:600px){

.plane{
font-size:40px;
}

.ship{
font-size:50px;
}

.icon{
font-size:26px;
}

}

</style>
</head>

<body>

<div class="plane">✈️</div>
<div class="ship">🛳️</div>

<div class="icon sun">☀️</div>
<div class="icon beach">🏖️</div>
<div class="icon camera">📸</div>
<div class="icon beer">🍻</div>
<div class="icon bag">🧳</div>

<div class="container">

<h1>EUROSUMMER 🏵️</h1>

<p class="subtitle">
Contagem regressiva para a viagem
</p>

<div id="contador"></div>

<p>Lisboa • Madrid • Barcelona • Mediterrâneo</p>

</div>

<script>

const dataViagem = new Date("2026-08-18T00:00:00");

function atualizar(){

const agora = new Date();
const diff = dataViagem - agora;

if(diff<=0){
document.getElementById("contador").innerHTML="A VIAGEM COMEÇOU ✈️";
return;
}

const d=Math.floor(diff/(1000*60*60*24));
const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m=Math.floor((diff%(1000*60*60))/(1000*60));
const s=Math.floor((diff%(1000*60))/1000);

document.getElementById("contador").innerHTML=
d+"d "+h+"h "+m+"m "+s+"s";

}

setInterval(atualizar,1000);

</script>

</body>
</html>
